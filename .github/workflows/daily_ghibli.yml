name: Daily Ghibli Refresh
on:
  schedule:
    - cron: '0 15 * * *' 
  workflow_dispatch:      

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Push to TRMNL
        run: |
          IMAGE=$(ls *.jpg | shuf -n 1)
          echo "Sending $IMAGE to TRMNL..."
          
          # We use the /api/custom_image/ endpoint for direct image pushes
          curl -X POST "https://usetrmnl.com/api/custom_image/bf578f92-2df0-4fad-aece-f67a2b82aef" \
               -H "Content-Type: image/jpeg" \
               --data-binary @"$IMAGE"
