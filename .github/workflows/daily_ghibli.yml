name: Daily Ghibli Refresh
on:
  schedule:
    - cron: '0 15 * * *' 
  workflow_dispatch:      

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Pick and Push Image
        run: |
          IMAGE=$(ls *.jpg | shuf -n 1)
          echo "Encoding $IMAGE..."
          
          # Convert image to Base64
          B64_DATA=$(base64 -w 0 "$IMAGE")
          
          # Send to TRMNL as a variable named 'ghibli_image'
          curl -X POST \
               -H "Content-Type: application/json" \
               -d "{\"merge_variables\": {\"ghibli_image\": \"data:image/jpeg;base64,$B64_DATA\"}}" \
               "https://usetrmnl.com/api/custom_plugins/bf578f92-2df0-4fad-aece-f67a2b82aef"
