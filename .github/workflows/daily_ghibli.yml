name: Daily Ghibli Refresh
on:
  schedule:
    - cron: '0 15 * * *' 
  workflow_dispatch:      

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Pick and Push Image
        run: |
          IMAGE=$(ls *.jpg | shuf -n 1)
          echo "Sending $IMAGE to TRMNL..."
          
          # This version sends the image correctly to a Custom Plugin Webhook
          curl -X POST \
               -H "Content-Type: image/jpeg" \
               --data-binary @"$IMAGE" \
               "https://usetrmnl.com/api/custom_plugins/bf578f92-2df0-4fad-aece-f67a2b82aef"
