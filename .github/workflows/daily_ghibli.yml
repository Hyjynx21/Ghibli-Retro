name: Daily Ghibli Refresh
on:
  schedule:
    - cron: '0 15 * * *' 
  workflow_dispatch:      

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Push to TRMNL
        run: |
          # 1. Pick a random JPG
          IMAGE=$(ls *.jpg | shuf -n 1)
          echo "Selected: $IMAGE"
          
          # 2. Convert to Base64 and wrap it in the JSON TRMNL needs
          B64_DATA=$(base64 -w 0 "$IMAGE")
          echo "{\"merge_variables\": {\"ghibli_image\": \"data:image/jpeg;base64,$B64_DATA\"}}" > payload.json
          
          # 3. Send the FILE to TRMNL (this avoids the 'Argument list too long' error)
          curl -X POST "https://usetrmnl.com/api/custom_plugins/bf578f92-2df0-4fad-aece-f67a2b82aef" \
               -H "Content-Type: application/json" \
               -d @payload.json
