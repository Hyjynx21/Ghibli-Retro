name: Daily Ghibli Refresh
on:
  schedule:
    - cron: '0 15 * * *' 
  workflow_dispatch:      

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Pick and Push Image
        run: |
          # Find a random jpg
          IMAGE=$(ls *.jpg | shuf -n 1)
          echo "Encoding $IMAGE..."
          
          # Convert to base64 string
          B64_DATA=$(base64 -w 0 "$IMAGE")
          
          # Construct the JSON manually to avoid quote escape issues
          JSON_DATA="{\"merge_variables\": {\"ghibli_image\": \"data:image/jpeg;base64,$B64_DATA\"}}"
          
          # Send to TRMNL
          curl -X POST \
               -H "Content-Type: application/json" \
               -d "$JSON_DATA" \
               "https://usetrmnl.com/api/custom_plugins/bf578f92-2df0-4fad-aece-f67a2b82aef"
